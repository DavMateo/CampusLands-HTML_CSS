<!DOCTYPE html>

<html lang="es">

    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Haz que jugar Eve Online o Eve Echoes sea sencillo. Aquí encontrarás un conjunto de herramientas que te serán útiles durante tu estadía en New Eden." />
        <meta name="robots" content= "index, follow" />
        <meta name="keywords" content="Eve Online, Eve Echoes, Videojuegos, Herramientas" />
        <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
        <link rel="icon" type="image/png" sizes="16x16"  href="./icon/favicon-16x16.png" />
        <title>EVE Tools</title>
    </head>

    <body>
        <!-- Uso de metodología BEM -->
        <div class="sidebar">
            <!-- Módulo independiente -->
            <div class="sbHeader">
                <div class="sbHeader_menu--active ">
                    X
                </div> <!-- sbHeader_menu--disable -->

                <div class="sbHeader_bienvenida">
                    <span class="sbHeader_bienvenida-texto">¡Buenas Tardes Mateo!</span>
                </div>

                <div class="sbHeader_buscar">
                    <form action="#">
                        <input type="text" name="buscar" id="buscar" placeholder="Buscar aquí" />
                        <i class="ri-search-2-fill"></i>
                    </form>
                </div>

                <div class="sbHeader_darkmode">
                    <label for="darkLight">
                        <i class="ri-sun-fill"></i>
                        <i class="ri-moon-clear-fill"></i>
                    </label>
                    <input type="checkbox" name="darkLight" id="darkLight" />
                </div>

                <div class="sbHeader_notif">
                    <i class="ri-notification-3-line"></i>
                    <div class="sbHeader_notif-num">
                        <span>5</span>
                    </div>
                </div>

                <a class="sbHeader_perfil" href="#">
                    <img class="sbHeader_perfil-imagen" src="./img/imagenPerfil.jpeg" alt="perfil" width="100px" />
                    <!-- el atributo width se eliminará luego y reemplazará por CSS. -->
                </a>
            </div>

            <!-- Módulo independiente -->
            <div class="sidebarNavbar"></div>
        </div>

        <header></header>

        <main></main>

        <footer></footer>
    </body>

</html>
