<!DOCTYPE html>

<html lang="es">

    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Haz que jugar Eve Online o Eve Echoes sea sencillo. Aquí encontrarás un conjunto de herramientas que te serán útiles durante tu estadía en New Eden." />
        <meta name="robots" content= "index, follow" />
        <meta name="keywords" content="Eve Online, Eve Echoes, Videojuegos, Herramientas" />
        <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />
        <link rel="icon" type="image/png" sizes="16x16"  href="./icon/favicon-16x16.png" />
        <link rel="stylesheet" href="./css/style.css" />
        <title>EVE Tools</title>
    </head>

    <body>
        <!-- Uso de metodología BEM -->
        <div class="sidebar">
            <!-- Módulo independiente -->
            <nav class="sbHeader">
                <div class="sbHeader_grupo1">
                    <button class="sbHeader_menu sbHeader_menu--active ">
                        <div class="sbHeader_line"></div>
                        <div class="sbHeader_line"></div>
                        <div class="sbHeader_line"></div>
                    </button>
    
                    <div class="sbHeader_bienvenida">
                        <span>¡Buenas Tardes Jhon!</span>
                    </div>
                </div>

                <div class="sbHeader_grupo2">
                    <form class="sbHeader_buscar" action="#">
                        <input type="text" name="buscar" id="buscar" placeholder="Buscar aquí" />
                        <i class="ri-search-2-fill"></i>
                    </form>
                </div>

                <div class="sbHeader_grupo3">
                    <div class="sbHeader_checkbox">
                        <label class="sbHeader_darkmode">
                            <input type="checkbox" name="darkLight" id="darkLight" />
                            <span class="sbHeader_check"></span>
                        </label>
                        
                    </div>
    
                    <button class="sbHeader_notif">
                        <i class="ri-notification-3-line"></i>
                        <div class="sbHeader_notif-num"></div>
                    </button>
                </div>
            </nav>

            <!-- Módulo independiente -->
            <div class="sbNavbar">
                <div class="sbNavbar_header">
                    <img class="sbNavbar_logo" src="./icon/iconWebsite.png" alt="eve" />
                    <span class="sbNavbar_textLogo">
                        <strong>EVE</strong> Tools
                    </span>
                </div>

                <div class="sbNavbar_main">
                    <ul class="sbNavbar_list">
                        <li>
                            <i class="ri-dashboard-fill"></i>
                            <a href="#">Dashboard</a>
                        </li>

                        <li>
                            <i class="ri-wallet-3-fill"></i>
                            <a href="#">Cartera</a>
                        </li>

                        <li>
                            <i class="ri-profile-fill"></i>
                            <a href="#">Perfil del piloto</a>
                        </li>

                        <li>
                            <i class="ri-pencil-ruler-2-fill"></i>
                            <a href="#">Características</a>
                        </li>

                        <li>
                            <i class="ri-instance-fill"></i>
                            <a href="#">Repartir loot</a>
                        </li>

                        <li>
                            <i class="ri-space-ship-fill"></i>
                            <a href="#">Simulador Anexos</a>
                        </li>

                        <li>
                            <i class="ri-newspaper-fill"></i>
                            <a href="#">Noticias</a>
                        </li>

                        <li>
                            <i class="ri-cup-fill"></i>
                            <a href="#">Donaciones</a>
                        </li>

                        <li>
                            <i class="ri-tools-fill"></i>
                            <a href="#">Configuración</a>
                        </li>
                    </ul>
                </div>

                <div class="sbNavbar_footer">
                    <a class="sbNavbar_link-perfil" href="#">
                        <img class="sbNavbar_imagen-perfil" src="./img/imagenPerfil.jpeg" alt="perfil" width="80px" />
                    </a>

                    <span class="sbNavbar_info">Jhon Cooper</span>
                    <span class="sbNavbar_info">Piloto PvE</span>

                    <button class="sbNavbar_logout">
                        <i class="ri-logout-circle-fill"></i>
                        <span class="sbNavbar_logout-text">Cerrar Sesión</span>
                    </button>
                </div>
            </div>
        </div>

        <header></header>

        <main></main>

        <footer></footer>
    </body>

</html>
